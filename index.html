<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryJar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --border:    #e8e0d5;
      --border-md: #d4c9ba;
      --text:      #2c2418;
      --text-muted:#7a6e62;
      --text-hint: #b0a899;
      --amber:     #c87f2a;
      --amber-lt:  #fde8bb;
      --amber-dk:  #8b5a1a;
      --jar-body:  #FDE8BB;
      --jar-rim:   #C8955A;
      --jar-lid:   #A0785A;
      --jar-liddark:#7a5235;
      --accent:    #c87f2a;

      --slip-1: #B5D4F4;
      --slip-2: #9FE1CB;
      --slip-3: #F4C0D1;
      --slip-4: #FAC775;
      --slip-5: #CECBF6;
      --slip-6: #F5C4B3;
      --slip-7: #C0DD97;
      --slip-8: #F7C1C1;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(44,36,24,0.07);
      --shadow-md: 0 4px 16px rgba(44,36,24,0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #1a1610;
        --surface:   #241f18;
        --border:    #3a3228;
        --border-md: #524840;
        --text:      #f0e8d8;
        --text-muted:#9a8e80;
        --text-hint: #5a5048;
        --amber:     #e09040;
        --amber-lt:  #3a2a10;
        --amber-dk:  #f5b060;
        --jar-body:  #3a2e1a;
        --jar-rim:   #a07040;
        --jar-lid:   #7a5830;
        --jar-liddark:#5a3e20;
        --accent:    #e09040;

        --slip-1: #1a3a5a;
        --slip-2: #0a3a28;
        --slip-3: #4a1a30;
        --slip-4: #4a3010;
        --slip-5: #2a2050;
        --slip-6: #4a2218;
        --slip-7: #1a3a08;
        --slip-8: #4a1010;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2.5rem 1rem 4rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      margin: 0 auto 0.75rem;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .input-section {
      width: 100%;
      max-width: 460px;
      margin-bottom: 2.5rem;
    }

    .input-wrap {
      display: flex;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 6px 6px 6px 14px;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-wrap:focus-within {
      border-color: var(--border-md);
      box-shadow: 0 0 0 3px rgba(200,127,42,0.12);
    }

    .memory-input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }

    .memory-input::placeholder { color: var(--text-hint); }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 14px;
      background: var(--amber);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-btn:hover { background: var(--amber-dk); }
    .add-btn:active { transform: scale(0.96); }

    .add-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .jar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .jar-container {
      position: relative;
      width: 210px;
      height: 270px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.15s;
    }

    .jar-container:hover { filter: brightness(1.04) saturate(1.1); }
    .jar-container:active { filter: brightness(0.97); }

    .jar-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
