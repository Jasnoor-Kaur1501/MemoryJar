<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryJar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --border:    #e8e0d5;
      --border-md: #d4c9ba;
      --text:      #2c2418;
      --text-muted:#7a6e62;
      --text-hint: #b0a899;
      --amber:     #c87f2a;
      --amber-lt:  #fde8bb;
      --amber-dk:  #8b5a1a;
      --jar-body:  #FDE8BB;
      --jar-rim:   #C8955A;
      --jar-lid:   #A0785A;
      --jar-liddark:#7a5235;
      --accent:    #c87f2a;

      --slip-1: #B5D4F4;
      --slip-2: #9FE1CB;
      --slip-3: #F4C0D1;
      --slip-4: #FAC775;
      --slip-5: #CECBF6;
      --slip-6: #F5C4B3;
      --slip-7: #C0DD97;
      --slip-8: #F7C1C1;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(44,36,24,0.07);
      --shadow-md: 0 4px 16px rgba(44,36,24,0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #1a1610;
        --surface:   #241f18;
        --border:    #3a3228;
        --border-md: #524840;
        --text:      #f0e8d8;
        --text-muted:#9a8e80;
        --text-hint: #5a5048;
        --amber:     #e09040;
        --amber-lt:  #3a2a10;
        --amber-dk:  #f5b060;
        --jar-body:  #3a2e1a;
        --jar-rim:   #a07040;
        --jar-lid:   #7a5830;
        --jar-liddark:#5a3e20;
        --accent:    #e09040;

        --slip-1: #1a3a5a;
        --slip-2: #0a3a28;
        --slip-3: #4a1a30;
        --slip-4: #4a3010;
        --slip-5: #2a2050;
        --slip-6: #4a2218;
        --slip-7: #1a3a08;
        --slip-8: #4a1010;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2.5rem 1rem 4rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      margin: 0 auto 0.75rem;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .input-section {
      width: 100%;
      max-width: 460px;
      margin-bottom: 2.5rem;
    }

    .input-wrap {
      display: flex;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 6px 6px 6px 14px;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-wrap:focus-within {
      border-color: var(--border-md);
      box-shadow: 0 0 0 3px rgba(200,127,42,0.12);
    }

    .memory-input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }

    .memory-input::placeholder { color: var(--text-hint); }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 14px;
      background: var(--amber);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-btn:hover { background: var(--amber-dk); }
    .add-btn:active { transform: scale(0.96); }

    .add-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .jar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .jar-container {
      position: relative;
      width: 210px;
      height: 270px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.15s;
    }

    .jar-container:hover { filter: brightness(1.04) saturate(1.1); }
    .jar-container:active { filter: brightness(0.97); }

    .jar-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .shake {
      animation: jarShake 0.55s cubic-bezier(0.36,0.07,0.19,0.97) both;
      transform-origin: center bottom;
    }

    @keyframes jarShake {
      0%,100% { transform: rotate(0deg) translateY(0); }
      12%  { transform: rotate(-9deg) translateY(-5px); }
      25%  { transform: rotate(9deg)  translateY(-8px); }
      37%  { transform: rotate(-7deg) translateY(-5px); }
      50%  { transform: rotate(7deg)  translateY(-3px); }
      62%  { transform: rotate(-4deg) translateY(-1px); }
      75%  { transform: rotate(3deg); }
      88%  { transform: rotate(-1deg); }
    }

    .shake-label {
      font-size: 12px;
      color: var(--text-hint);
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.3px;
      height: 18px;
      transition: opacity 0.2s;
    }

    .count-label {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 4px;
      font-style: italic;
      font-family: 'Lora', serif;
    }

    .empty-label {
      font-size: 13px;
      color: var(--text-hint);
      text-align: center;
      margin-top: 4px;
    }

    .reveal-area {
      width: 100%;
      max-width: 420px;
      margin-top: 1.75rem;
    }

    .reveal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: var(--shadow-md);
      animation: cardReveal 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: scale(0.85) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .reveal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .reveal-meta {
      flex: 1;
    }

    .reveal-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-hint);
      margin-bottom: 4px;
    }

    .reveal-text {
      font-family: 'Lora', serif;
      font-size: 16px;
      color: var(--text);
      line-height: 1.55;
    }

    .shake-again-btn {
      margin-top: 10px;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .shake-again-btn:hover { opacity: 0.75; }

    .list-section {
      width: 100%;
      max-width: 420px;
      margin-top: 1.5rem;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .list-toggle {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .list-toggle:hover { color: var(--text); }

    .memory-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .memory-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--text-muted);
      animation: itemIn 0.2s ease both;
    }

    @keyframes itemIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      color: var(--text);
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-hint);
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.12s;
      display: flex;
      align-items: center;
    }

    .del-btn:hover { color: #c0392b; }

    .footer {
      margin-top: 3rem;
      font-size: 12px;
      color: var(--text-hint);
      text-align: center;
      font-family: 'Lora', serif;
      font-style: italic;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      body { padding: 1.5rem 0.75rem 3rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="14" y="10" width="20" height="4" rx="2" fill="#A0785A"/>
      <path d="M10 14 Q8 16 7 22 L4 38 Q3 44 8 46 Q16 49 24 49 Q32 49 40 46 Q45 44 44 38 L41 22 Q40 16 38 14 Z" fill="#FDE8BB"/>
      <path d="M10 14 Q8 16 7 22 L4 38 Q3 44 8 46 Q16 49 24 49 Q32 49 40 46 Q45 44 44 38 L41 22 Q40 16 38 14 Z" fill="none" stroke="#C8955A" stroke-width="1.2"/>
      <path d="M13 20 Q12 34 14 42" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
      <rect x="22" y="28" width="12" height="5" rx="2" fill="#9FE1CB" opacity="0.8" transform="rotate(-5 22 28)"/>
      <rect x="15" y="34" width="10" height="5" rx="2" fill="#F4C0D1" opacity="0.8" transform="rotate(4 15 34)"/>
      <rect x="27" y="35" width="9" height="5" rx="2" fill="#FAC775" opacity="0.8" transform="rotate(-3 27 35)"/>
    </svg>
    <h1>MemoryJar</h1>
    <p class="tagline">Drop in a memory. Shake to rediscover one.</p>
  </div>

  <div class="input-section">
    <div class="input-wrap">
      <input
        class="memory-input"
        id="memInput"
        type="text"
        placeholder="A memory to keep…"
        maxlength="200"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="Type a memory"
      />
      <button class="add-btn" id="addBtn" aria-label="Add memory to jar">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
          <line x1="7" y1="1" x2="7" y2="13"/>
          <line x1="1" y1="7" x2="13" y2="7"/>
        </svg>
        Drop in
      </button>
    </div>
  </div>

  <div class="jar-section">
    <div class="jar-container" id="jarContainer" role="button" tabindex="0" aria-label="Shake the jar to reveal a memory">
      <svg class="jar-svg" viewBox="0 0 210 270" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="bodyClip">
            <path d="M40 72 Q31 78 27 98 L17 215 Q15 240 32 248 Q54 258 105 258 Q156 258 178 248 Q195 240 193 215 L183 98 Q179 78 170 72 Z"/>
          </clipPath>
        </defs>

        <!-- lid -->
        <rect x="54" y="28" width="102" height="18" rx="5" fill="var(--jar-lid)"/>
        <rect x="50" y="42" width="110" height="14" rx="4" fill="var(--jar-liddark)"/>

        <!-- neck -->
        <path d="M64 56 L146 56 Q158 56 164 66 L170 72 L40 72 Q46 62 56 56 Z" fill="var(--jar-rim)" opacity="0.65"/>

        <!-- jar body (fill) -->
        <path d="M40 72 Q31 78 27 98 L17 215 Q15 240 32 248 Q54 258 105 258 Q156 258 178 248 Q195 240 193 215 L183 98 Q179 78 170 72 Z" fill="var(--jar-body)" opacity="0.55"/>

        <!-- slips layer (clipped to jar) -->
        <foreignObject x="0" y="0" width="210" height="270" clip-path="url(#bodyClip)">
          <div id="slipsLayer" xmlns="http://www.w3.org/1999/xhtml"
               style="width:210px;height:270px;display:flex;flex-wrap:wrap;align-content:flex-end;padding:0 22px 36px;gap:4px;pointer-events:none;">
          </div>
        </foreignObject>

        <!-- glass sheen -->
        <path d="M48 84 Q45 168 50 228" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round" opacity="0.3"/>
        <path d="M60 76 Q57 106 59 136" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.2"/>

        <!-- jar outline -->
        <path d="M40 72 Q31 78 27 98 L17 215 Q15 240 32 248 Q54 258 105 258 Q156 258 178 248 Q195 240 193 215 L183 98 Q179 78 170 72 Z"
              fill="none" stroke="var(--jar-rim)" stroke-width="1.5"/>
      </svg>
    </div>

    <p class="shake-label" id="shakeLabel" aria-live="polite"></p>
    <p class="count-label" id="countLabel" style="display:none;"></p>
    <p class="empty-label" id="emptyLabel">Add your first memory above</p>
  </div>

  <div class="reveal-area" id="revealArea" style="display:none;" aria-live="polite"></div>

  <div class="list-section" id="listSection" style="display:none;">
    <div class="list-header">
      <button class="list-toggle" id="listToggle" aria-expanded="false">show all</button>
    </div>
    <div class="memory-list" id="memoryList" style="display:none;"></div>
  </div>

  <footer class="footer">memories stored locally in your browser</footer>
